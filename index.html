<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="U.N.I. Game">
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <title>U.N.I.</title>
    <style>
        body { 
            margin: 0; background-color: #111; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; 
        }
        #gameWrapper { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: relative; 
        }
        canvas { 
            background-color: #000; border: 4px solid #fff; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); 
            display: block; touch-action: none; 
            max-width: 100%; max-height: 100%; width: 100vw; height: 100vh; object-fit: contain;
        }
        #dialogBox { 
            width: 90%; max-width: 708px; height: 120px; 
            background-color: rgba(0, 0, 0, 0.95); border: 4px solid #fff; 
            box-sizing: border-box; padding: 15px 20px; 
            position: absolute; bottom: 20px; visibility: hidden; z-index: 2000;
        }
        #dialogBox::after { content: ""; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid #fff; pointer-events: none; }
        #dialogName { color: #ffcc00; font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        #dialogText { color: white; font-size: 16px; white-space: pre-wrap; }
        #dialogIcon { color: white; font-size: 20px; position: absolute; bottom: 15px; right: 25px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        #joystickZone {
            position: absolute; bottom: 150px; left: 20px; width: 120px; height: 120px;
            background-color: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; z-index: 1000; display: none; touch-action: none;
        }
        #joystickKnob {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background-color: rgba(0,255,255,0.6); border-radius: 50%;
            pointer-events: none; box-shadow: 0 0 15px rgba(0,255,255,0.4);
            transition: transform 0.05s ease-out; 
        }
        @media (max-width: 768px) {
            canvas { border-width: 2px; }
            #dialogBox { width: 95%; border-width: 2px; bottom: 10px; }
            #joystickZone { bottom: 140px; left: 10px; width: 100px; height: 100px; }
            #joystickKnob { top: 25px; left: 25px; }
        }

        /* ======= PANEL DE DEBUG ======= */
        #debugBtn {
            position: fixed; bottom: 16px; right: 16px; z-index: 9000;
            background: #222; border: 2px solid #0ff; color: #0ff;
            font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold;
            padding: 8px 14px; cursor: pointer; border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
            transition: background 0.15s;
            user-select: none; -webkit-user-select: none;
        }
        #debugBtn:hover { background: #0ff; color: #000; }

        #debugPanel {
            position: fixed; top: 0; right: 0; bottom: 0; z-index: 8999;
            width: 340px; max-width: 95vw;
            background: rgba(10,10,20,0.97);
            border-left: 2px solid #0ff;
            overflow-y: auto; overflow-x: hidden;
            display: none; flex-direction: column;
            font-family: 'Courier New', monospace;
            font-size: 13px; color: #ccc;
            box-shadow: -4px 0 20px rgba(0,0,0,0.7);
        }
        #debugPanel.open { display: flex; }

        .dp-header {
            background: #0ff; color: #000; font-weight: bold;
            padding: 12px 16px; font-size: 15px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1;
        }
        .dp-close { cursor: pointer; font-size: 20px; line-height: 1; }

        .dp-section { padding: 12px 16px; border-bottom: 1px solid #333; }
        .dp-section h3 { color: #0ff; font-size: 12px; margin: 0 0 10px 0; letter-spacing: 2px; text-transform: uppercase; }

        /* Tarjetas de enemigos del catálogo */
        .enemy-card {
            display: flex; align-items: center; justify-content: space-between;
            background: #1a1a2e; border: 1px solid #333; border-radius: 6px;
            padding: 8px 10px; margin-bottom: 6px; gap: 8px;
        }
        .enemy-card-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
        .enemy-card-info { flex: 1; }
        .enemy-card-name { color: white; font-weight: bold; font-size: 13px; }
        .enemy-card-sub  { color: #666; font-size: 11px; margin-top: 2px; }
        .enemy-card-btn  {
            background: #0ff; color: #000; border: none; border-radius: 4px;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 12px;
            padding: 5px 10px; cursor: pointer; white-space: nowrap;
        }
        .enemy-card-btn:hover { background: #fff; }

        /* Formulario */
        .dp-row { display: flex; flex-direction: column; margin-bottom: 8px; }
        .dp-row label { color: #888; font-size: 11px; margin-bottom: 3px; }
        .dp-row input, .dp-row select, .dp-row textarea {
            background: #111; border: 1px solid #444; color: #eee;
            font-family: 'Courier New', monospace; font-size: 13px;
            padding: 6px 8px; border-radius: 4px; outline: none;
            width: 100%; box-sizing: border-box;
        }
        .dp-row input:focus, .dp-row select:focus, .dp-row textarea:focus { border-color: #0ff; }
        .dp-row textarea { resize: vertical; min-height: 50px; }
        .dp-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .dp-row-2col .dp-row { margin-bottom: 0; }

        .dp-attacks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
        .dp-attacks label {
            display: flex; align-items: center; gap: 4px;
            background: #1a1a2e; border: 1px solid #444; border-radius: 4px;
            padding: 4px 8px; cursor: pointer; color: #ccc; font-size: 12px;
        }
        .dp-attacks input[type=checkbox] { cursor: pointer; accent-color: #0ff; }

        .dp-probar-btn {
            width: 100%; padding: 12px; margin-top: 6px;
            background: #00cc00; color: #000; border: none; border-radius: 6px;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 15px;
            cursor: pointer; letter-spacing: 1px;
        }
        .dp-probar-btn:hover { background: #00ff00; }
        .dp-probar-btn:active { transform: scale(0.97); }

        .dp-msg { padding: 8px 12px; border-radius: 4px; font-size: 12px; margin-top: 8px; display: none; }
        .dp-msg.ok    { background: #003300; color: #00ff00; border: 1px solid #00ff00; display: block; }
        .dp-msg.error { background: #330000; color: #ff4444; border: 1px solid #ff4444; display: block; }

        .dp-color-row { display: flex; align-items: center; gap: 8px; }
        .dp-color-row input[type=text]  { flex: 1; }
        .dp-color-row input[type=color] { width: 36px; height: 32px; padding: 2px; border-radius: 4px; border: 1px solid #444; background: #111; cursor: pointer; }
    </style>
</head>
<body>
<div id="gameWrapper">
    <canvas id="gameCanvas" width="700" height="450"></canvas>
    <div id="dialogBox">
        <div id="dialogName">NOMBRE</div>
        <div id="dialogText">Texto...</div>
        <div id="dialogIcon">▼</div>
    </div>
    <div id="joystickZone"><div id="joystickKnob"></div></div>
</div>

<script>

// ================================================================
//  ██████╗  █████╗ ████████╗ █████╗ ██╗      ██████╗  ██████╗
//  ██╔════╝██╔══██╗╚══██╔══╝██╔══██╗██║     ██╔═══██╗██╔════╝
//  ██║     ███████║   ██║   ███████║██║     ██║   ██║██║  ███╗
//  ██║     ██╔══██║   ██║   ██╔══██║██║     ██║   ██║██║   ██║
//  ╚██████╗██║  ██║   ██║   ██║  ██║███████╗╚██████╔╝╚██████╔╝
//   ╚═════╝╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝╚══════╝ ╚═════╝  ╚═════╝
//
//  CATÁLOGO DE ENEMIGOS — AQUÍ AGREGAS NUEVOS ENEMIGOS
//  Cada enemigo es un objeto con sus propiedades únicas.
//  El motor de combate lee estas propiedades automáticamente.
// ================================================================

const CATALOGO_ENEMIGOS = {

    // -----------------------------------------------------------
    // JEFE: C4C-T4C  (el pistolero, el tirador que roba el turno)
    // -----------------------------------------------------------
    "C4C_T4C": {
        id:              "C4C_T4C",
        nombre:          "C4C-T4C",
        hp:              5000,
        barra_hp:        1000,      // cada "vida" es 1000 HP (5 barras)
        color:           "#ff0000",
        tamano:          { x: 40, y: 80 },
        musica:          "rodeo-de-c4c.mp3",
        fondo:           "DESIERTO",

        // Mechanic especial: "LADRON_TURNO" = el enemigo le dispara al botón de selección
        // para intentar ganar el primer turno antes de que el jugador elija
        mecanica_especial: "LADRON_TURNO",
        acciones_por_ronda: 2,      // cuántas veces ataca por ronda

        // Lista de ataques que ESTE enemigo puede usar.
        // El motor elegirá uno al azar de esta lista en cada ataque.
        ataques: ["LLUVIA", "NOPALAZO", "PINCHOS"],

        // Textos narrativos
        texto_intro:     "¡JAJAJAJ en serio ustedes humanos creen que\nme ganarán en un duelo? ES MI ESPECIALIDAD,\n¡MUERAN!",
        texto_victoria:  "Ugh, ¿en serio?",
        texto_revancha:  "¿Quieres volver a luchar contra mí?",

        // Daño de sus ataques (si el personaje no esquiva / si esquiva)
        dano_normal:     1000,
        dano_esquivado:  500,
    },

    // -----------------------------------------------------------
    // ENEMIGO NORMAL: SLIME (ejemplo de combate común)
    // Para activarlo: llama iniciarCombate("SLIME") desde el mapa
    // -----------------------------------------------------------
    "SLIME": {
        id:              "SLIME",
        nombre:          "Slime Verde",
        hp:              800,
        barra_hp:        800,       // una sola barra de vida
        color:           "#00dd77",
        tamano:          { x: 40, y: 45 },
        musica:          "batalla-normal.mp3",   // pon aquí tu MP3 de batalla normal
        fondo:           "BOSQUE",

        mecanica_especial: null,    // sin mecánica especial, turno normal
        acciones_por_ronda: 1,      // ataca solo una vez por ronda

        ataques: ["LLUVIA", "PINCHOS"],   // ataques más simples

        texto_intro:     "¡Un Slime Verde bloquea el camino!",
        texto_victoria:  "*blop*",
        texto_revancha:  "¿Volver a luchar?",

        dano_normal:     600,
        dano_esquivado:  200,
    },

    // -----------------------------------------------------------
    // CÓMO AGREGAR UN ENEMIGO NUEVO:
    // 1. Copia el bloque de "SLIME" y pégalo aquí abajo
    // 2. Cambia el ID ("MI_ENEMIGO"), nombre, hp, color, etc.
    // 3. Elige sus ataques de la lista: "LLUVIA", "NOPALAZO", "PINCHOS"
    //    (o agrega nuevos tipos en la función crearObstaculo())
    // 4. En el mapa, cuando el jugador toque el enemigo, llama:
    //    iniciarCombate("MI_ENEMIGO")
    // ¡Listo! El motor hace el resto solo.
    // -----------------------------------------------------------
};


// ================================================================
//  PARTIDO DE HÉROES — aquí defines a los personajes del jugador
//  Si agregas un héroe nuevo, ponlo aquí.
// ================================================================

const DATOS_HEROES = {
    "MEPHIS": {
        nombre: "Mephis",
        hp: 600, maxHp: 600,
        color: "#5b3846",
        tipo_ataque: "TRAZO",   // ataca dibujando trazos en la pantalla
    },
    "SARAH": {
        nombre: "Sarah",
        hp: 1000, maxHp: 1000,
        color: "#a3325b",
        tipo_ataque: "TAP",     // ataca tocando al enemigo directamente
    }
};


// ================================================================
//  FONDOS DE COMBATE
//  Agrega aquí el código de dibujo para cada fondo.
//  Se llama a drawFondo(nombre) durante el combate.
// ================================================================

function drawFondo(nombre, ctx, canvas) {
    const pisoCombateY = 360;

    if (nombre === "DESIERTO") {
        // Cielo cálido de desierto
        let grd = ctx.createLinearGradient(0, 0, 0, pisoCombateY);
        grd.addColorStop(0, "#e8cca6");
        grd.addColorStop(0.8, "#c18c60");
        ctx.fillStyle = grd;
        ctx.fillRect(-200, -200, canvas.width + 400, pisoCombateY + 200);
        // Suelo terroso
        ctx.fillStyle = "#8a5733";
        ctx.fillRect(-200, pisoCombateY - 100, canvas.width + 400, 100);
        // Sombra bajo los personajes
        ctx.fillStyle = "#2e153e";
        ctx.fillRect(-200, pisoCombateY, canvas.width + 400, canvas.height - pisoCombateY + 200);
        ctx.fillStyle = "#d08266";
        ctx.fillRect(-200, pisoCombateY + 10, canvas.width + 400, 5);

    } else if (nombre === "BOSQUE") {
        // Cielo azul de bosque
        let grd = ctx.createLinearGradient(0, 0, 0, pisoCombateY);
        grd.addColorStop(0, "#3a5a8c");
        grd.addColorStop(0.7, "#5a8c60");
        ctx.fillStyle = grd;
        ctx.fillRect(-200, -200, canvas.width + 400, pisoCombateY + 200);
        // Suelo verde
        ctx.fillStyle = "#2d5a2d";
        ctx.fillRect(-200, pisoCombateY - 80, canvas.width + 400, 80);
        ctx.fillStyle = "#1a3a1a";
        ctx.fillRect(-200, pisoCombateY, canvas.width + 400, canvas.height - pisoCombateY + 200);
        ctx.fillStyle = "#4a8a4a";
        ctx.fillRect(-200, pisoCombateY + 10, canvas.width + 400, 5);

    } else {
        // Fondo genérico por defecto (oscuro neutro)
        ctx.fillStyle = "#1a1a2e";
        ctx.fillRect(-200, -200, canvas.width + 400, canvas.height + 400);
        ctx.fillStyle = "#16213e";
        ctx.fillRect(-200, pisoCombateY, canvas.width + 400, canvas.height + 200);
    }
}


// ================================================================
//  MOTOR DEL JUEGO — A PARTIR DE AQUÍ, NO NECESITAS TOCAR NADA
//  PARA AGREGAR ENEMIGOS. Solo edita el catálogo de arriba.
// ================================================================

// --- AUDIO ---
const musicaBatalla = new Audio();
musicaBatalla.loop = true;
musicaBatalla.volume = 1.0;

// --- CANVAS ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- JOYSTICK MÓVIL ---
const joystickZone = document.getElementById("joystickZone");
const joystickKnob = document.getElementById("joystickKnob");
let joyVector = { x: 0, y: 0 };
const esMovil = ('ontouchstart' in window || navigator.maxTouchPoints > 0);

if (esMovil) {
    joystickZone.addEventListener("touchstart", manejarToqueJoystick, { passive: false });
    joystickZone.addEventListener("touchmove",  manejarToqueJoystick, { passive: false });
    joystickZone.addEventListener("touchend",   soltarJoystick,       { passive: false });
    joystickZone.addEventListener("touchcancel",soltarJoystick,       { passive: false });
}

function manejarToqueJoystick(e) {
    e.preventDefault();
    let toque = e.targetTouches[0]; if (!toque) return;
    let rect = joystickZone.getBoundingClientRect();
    let radioBase = rect.width / 2;
    let cx = rect.left + radioBase, cy = rect.top + radioBase;
    let dx = toque.clientX - cx, dy = toque.clientY - cy;
    let dist = Math.hypot(dx, dy), radioK = 25, lim = radioBase - radioK;
    if (dist > lim) { dx = (dx/dist)*lim; dy = (dy/dist)*lim; }
    joystickKnob.style.transition = "none";
    joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    joyVector.x = dx / lim; joyVector.y = dy / lim;
}

function soltarJoystick(e) {
    e.preventDefault();
    joystickKnob.style.transition = "transform 0.1s ease-out";
    joystickKnob.style.transform = "translate(0px, 0px)";
    joyVector.x = 0; joyVector.y = 0;
}

// --- CONSTANTES DE LAYOUT ---
const PISO_Y = 360;

// --- ESTADO DEL JUEGO ---
let estadoJuego = "MUNDO";
let tiempoAnim = 0;
let timerShock = 0;
let frameDesliz = 0;
const FRAMES_DESLIZ = 60;
let timerFade = 0;

// --- CÁMARA ---
let camara = { x: 0, y: 0, zoom: 1, amp: 4, freqX: 0.05, freqY: 0.07, tiempo: 0 };
let targetLookX = 350, targetLookY = 225, targetZoom = 1.0;
let lookX = 350, lookY = 225;
let screenShake = 0;

const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowDown:false, ArrowLeft:false, ArrowRight:false, Enter:false };

// --- ENEMIGO ACTUAL EN COMBATE ---
// Esta variable se llena cuando iniciarCombate() es llamado
let enemigoActual = null;

// --- ESTADO HP DEL BOSS (se reinicia con cada combate) ---
let boss = { hp: 0, maxHp: 0, color: "#ff0000" };

// --- HÉROES (estado de combate, con física fluida) ---
function crearEstadoHeroe(datos) {
    return {
        nombre:       datos.nombre,
        hp:           datos.hp,
        maxHp:        datos.maxHp,
        color:        datos.color,
        tipo_ataque:  datos.tipo_ataque,
        accion: "NADA", estado: "VIVO", turnosCaido: 0,
        shake: 0, flash: 0,
        offsetX: 0, offsetY: 0, scaleY: 1,
        targetOffsetX: 0, targetScaleY: 1, velY: 0
    };
}

let mephis = crearEstadoHeroe(DATOS_HEROES["MEPHIS"]);
let sarah  = crearEstadoHeroe(DATOS_HEROES["SARAH"]);

// --- TURNOS ---
let ordenTurnos = [], turnoActualIndex = 0;
let heroesPendientes = [], bossAccionesPendientes = 0;
let timerBoss = 0;
const MAX_TIMER_BOSS_RAPIDO = 6, MAX_TIMER_BOSS_NORMAL = 90;
let impactosBoss = [];

let textoOverworld = "";
let mensajeTurno = "";
let animacionTurno = null;
let esperandoClic = false;

// --- ATAQUES Y GESTOS ---
let isDragging = false;
let trazoAtaque = [], efectosGolpe = [], textosFlotantes = [];
let enemigoGolpeado = false, timerGolpe = 0, timerAtaqueFase = 0;
let danoAcumulado = 0, cooldownGolpe = 0, timerMostrarDano = 0;
let lastSwipeX = 0, lastSwipeY = 0;

// --- POSICIONES EN EL MUNDO Y EN COMBATE ---
const playerMundo  = { x: 300, y: 220, size: 25, speed: 4, color: "#00ffff" };
const enemyMundo   = { x: 450, y: 220, size: 25, color: "#ff0000" };

const playerCombate  = { x: 0, y: PISO_Y, targetX: 180, startX: 0, sizeX: 30, sizeY: 60,  color: "#00ffff"  };
const player2Combate = { x: 0, y: PISO_Y, targetX: 140, startX: 0, sizeX: 25, sizeY: 55,  color: "#ff5252"  };
const enemyCombate   = { x: 0, y: PISO_Y, targetX: 480, startX: 0, sizeX: 40, sizeY: 80,  color: "#ff0000", shake: 0 };

// Mapa de IDs de turno a colores para la cola visual
const coloresID = { "MEPHIS": "#5b3846", "SARAH": "#a3325b" };
// Los IDs del boss se generan dinámicamente al iniciar combate

// ================================================================
//  FUNCIÓN PRINCIPAL: iniciarCombate(idEnemigo)
//  Llama esto desde el mapa para empezar cualquier pelea.
//  Ejemplo: iniciarCombate("SLIME") o iniciarCombate("C4C_T4C")
// ================================================================
function iniciarCombate(idEnemigo) {
    const datos = CATALOGO_ENEMIGOS[idEnemigo];
    if (!datos) { console.error("Enemigo no encontrado:", idEnemigo); return; }

    enemigoActual = datos;

    // Configurar HP del boss con los datos del catálogo
    boss.hp    = datos.hp;
    boss.maxHp = datos.hp;
    boss.color = datos.color;

    // Ajustar tamaño visual del enemigo
    enemyCombate.sizeX = datos.tamano.x;
    enemyCombate.sizeY = datos.tamano.y;
    enemyCombate.color = datos.color;

    // Agregar color de este enemigo al mapa de cola de turnos
    for (let i = 1; i <= datos.acciones_por_ronda; i++) {
        coloresID[idEnemigo + "_" + i] = datos.color;
    }

    // Cambiar música
    musicaBatalla.pause();
    musicaBatalla.src = datos.musica;
    musicaBatalla.currentTime = 0;

    textoOverworld = "";
}


// ================================================================
//  REINICIO DE PARTIDA
// ================================================================
function resetGame() {
    // Reiniciar héroes
    mephis = crearEstadoHeroe(DATOS_HEROES["MEPHIS"]);
    sarah  = crearEstadoHeroe(DATOS_HEROES["SARAH"]);

    // Reiniciar posición en el mapa
    playerMundo.x = 300; playerMundo.y = 220;
    enemyMundo.x  = 450; enemyMundo.y  = 220;

    // Limpiar efectos
    impactosBoss = []; trazoAtaque = []; efectosGolpe = []; textosFlotantes = [];
    camara.zoom = 1; lookX = 350; lookY = 225;

    estadoJuego = "MUNDO";
    timerFade = 0;
    animacionTurno = null;
    enemigoActual = null;

    if (enemigoActual) {
        textoOverworld = enemigoActual.texto_revancha || "¿Volver a luchar?";
    } else {
        textoOverworld = "¿Quieres volver a luchar?";
    }

    musicaBatalla.pause();
    musicaBatalla.currentTime = 0;
}


// ================================================================
//  SISTEMA DE DIÁLOGOS Y AVANCE DE ESTADO
// ================================================================
function avanzarDialogo(e) {
    if (estadoJuego === "GAME_OVER") {
        resetGame();
        if (e && e.target !== joystickZone) e.stopPropagation();
        return true;
    }
    if (!esperandoClic) return false;

    esperandoClic = false;
    mensajeTurno = "";

    if (estadoJuego === "COMBATE_INTRO") {
        iniciarFaseSeleccion();
    } else if (estadoJuego === "VICTORIA") {
        estadoJuego = "FADE_OUT";
        timerFade = 60;
    } else if (estadoJuego === "COMBATE_RESOLUCION" && animacionTurno) {
        if      (animacionTurno.paso === "GAME_OVER_MSG")  { estadoJuego = "GAME_OVER"; animacionTurno = null; }
        else if (animacionTurno.paso === "IMPACTO_BOSS")   terminarTurnoBoss();
        else if (animacionTurno.paso === "MENSAJE_HEROE" ||
                 animacionTurno.paso === "MENSAJE")        terminarTurnoHeroe();
    }
    if (e && e.target !== joystickZone) e.stopPropagation();
    return true;
}

window.addEventListener("pointerdown", (e) => { if (avanzarDialogo(e)) return; }, true);

canvas.addEventListener("pointerdown", (e) => {
    if (esperandoClic || estadoJuego === "GAME_OVER" || estadoJuego === "FADE_OUT") return;

    lastSwipeX = e.clientX; lastSwipeY = e.clientY;
    const rect = canvas.getBoundingClientRect();
    let sx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    let sy = (e.clientY - rect.top)  * (canvas.height / rect.height);
    let wx = (sx - camara.x) / camara.zoom;
    let wy = (sy - camara.y) / camara.zoom;

    if (estadoJuego === "COMBATE_SELECCION" && heroesPendientes.length > 0) {
        let actual = heroesPendientes[0] === "MEPHIS" ? mephis : sarah;
        if (actual.estado === "VIVO") {
            if      (sx > 50  && sx < 300 && sy > canvas.height-150 && sy < canvas.height-30) registrarAccionJugador("ESCUDO");
            else if (sx > canvas.width-300 && sx < canvas.width-50 && sy > canvas.height-150 && sy < canvas.height-30) registrarAccionJugador("ATAQUE");
        }
    } else if (estadoJuego === "ATAQUE_MEPHIS") {
        isDragging = true;
        agregarPuntoTrazo(wx, wy);
    } else if (estadoJuego === "ATAQUE_SARAH") {
        if (wx > enemyCombate.x-15 && wx < enemyCombate.x+enemyCombate.sizeX+15 &&
            wy > enemyCombate.y-enemyCombate.sizeY-15 && wy < enemyCombate.y+15) {
            aplicarDanoBoss(25, wx, wy);
            efectosGolpe.push({x: wx, y: wy, life: 10, maxLife: 10});
        }
    }
});

canvas.addEventListener("pointermove", (e) => {
    const rect = canvas.getBoundingClientRect();
    let sx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    let sy = (e.clientY - rect.top)  * (canvas.height / rect.height);
    let wx = (sx - camara.x) / camara.zoom;
    let wy = (sy - camara.y) / camara.zoom;

    if (isDragging && estadoJuego === "ATAQUE_MEPHIS") {
        agregarPuntoTrazo(wx, wy);
        comprobarCorteAlEnemigo(wx, wy);
    }

    if (estadoJuego === "COMBATE_RESOLUCION" && animacionTurno &&
       (animacionTurno.paso === "PRE_ESQUIVE" || animacionTurno.paso === "ATAQUE_ACTIVO_BOSS")) {
        let dx = e.clientX - lastSwipeX, dy = e.clientY - lastSwipeY;
        if (Math.hypot(dx, dy) > 40) {
            let tObj = animacionTurno.targetRef;
            if (Math.abs(dx) > Math.abs(dy)) { tObj.targetOffsetX = dx > 0 ? 80 : -80; }
            else {
                if (dy > 0)            tObj.targetScaleY = 0.4;
                else if (tObj.offsetY >= -5) tObj.velY = -14;
            }
            lastSwipeX = e.clientX; lastSwipeY = e.clientY;
        }
    }
});

canvas.addEventListener("pointerup", () => { isDragging = false; });
window.addEventListener("keydown", e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; if (e.key === "Enter") avanzarDialogo(e); });
window.addEventListener("keyup",   e => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });


// ================================================================
//  LÓGICA DE COMBATE
// ================================================================

function iniciarFaseSeleccion() {
    estadoJuego = "COMBATE_SELECCION";
    ordenTurnos = [];
    heroesPendientes = ["MEPHIS", "SARAH"];
    bossAccionesPendientes = enemigoActual ? enemigoActual.acciones_por_ronda : 2;
    timerBoss = MAX_TIMER_BOSS_RAPIDO;
    impactosBoss = [];
}

function registrarAccionJugador(accion) {
    if (heroesPendientes.length === 0) return;
    let heroeId = heroesPendientes.shift();
    let heroeObj = heroeId === "MEPHIS" ? mephis : sarah;
    heroeObj.accion = accion;
    ordenTurnos.push(heroeId);

    if (heroesPendientes.length === 0) {
        // El boss llena sus turnos en la cola
        for (let i = bossAccionesPendientes; i > 0; i--) {
            ordenTurnos.push(enemigoActual.id + "_" + (bossAccionesPendientes - i + 1));
        }
        bossAccionesPendientes = 0;
        iniciarFaseResolucion();
    }
}

function iniciarFaseResolucion() {
    estadoJuego = "COMBATE_RESOLUCION";
    turnoActualIndex = 0;
    ejecutarTurno();
}

function ejecutarTurno() {
    if (boss.hp <= 0) {
        estadoJuego = "VICTORIA";
        animacionTurno = null;
        mensajeTurno = enemigoActual ? enemigoActual.texto_victoria : "...";
        esperandoClic = true;
        return;
    }

    if (turnoActualIndex >= ordenTurnos.length) {
        iniciarFaseSeleccion();
        return;
    }

    let turnoDe = ordenTurnos[turnoActualIndex];
    mensajeTurno = "";

    // ¿Es turno del enemigo?
    if (turnoDe.startsWith(enemigoActual.id)) {
        let vivosAhora = [mephis, sarah].filter(h => h.estado === "VIVO");
        if (vivosAhora.length === 0) {
            animacionTurno = { paso: "GAME_OVER_MSG", targetVisual: enemyCombate };
            mensajeTurno = "¡EL EQUIPO HA SIDO ANIQUILADO!";
            esperandoClic = true;
        } else {
            let target = vivosAhora[Math.floor(Math.random() * vivosAhora.length)];
            animacionTurno = { paso: "CARGAR_BOSS", timer: 45, targetRef: target, obstaculos: [] };
        }
    }
    // ¿Es turno de un héroe?
    else if (turnoDe === "MEPHIS" || turnoDe === "SARAH") {
        let char   = turnoDe === "MEPHIS" ? mephis : sarah;
        let visual = turnoDe === "MEPHIS" ? player2Combate : playerCombate;

        if (char.estado === "CAIDO") {
            char.turnosCaido--;
            if (char.turnosCaido <= 0) {
                char.hp = Math.floor(char.maxHp / 2);
                char.estado = "VIVO"; char.accion = "NADA";
                mensajeTurno = `¡${char.nombre} se ha recuperado!`;
            } else {
                mensajeTurno = `${char.nombre} está débil...`;
            }
            animacionTurno = { paso: "MENSAJE_HEROE", targetVisual: visual };
            esperandoClic = true;
        } else if (char.accion === "ESCUDO") {
            mensajeTurno = `${char.nombre} mantiene la guardia firme.`;
            animacionTurno = { paso: "MENSAJE_HEROE", targetVisual: visual };
            esperandoClic = true;
        } else if (char.accion === "ATAQUE") {
            iniciarMinijuego(`ATAQUE_${turnoDe}`);
            return;
        }
    }
}

function terminarTurnoBoss()  { animacionTurno = null; turnoActualIndex++; ejecutarTurno(); }
function terminarTurnoHeroe() { animacionTurno = null; turnoActualIndex++; ejecutarTurno(); }

function agregarPuntoTrazo(wx, wy) { trazoAtaque.push({x: wx, y: wy, life: 15, maxLife: 15}); }

function aplicarDanoBoss(dano, x, y) {
    enemigoGolpeado = true; timerGolpe = 6; screenShake = 5;
    danoAcumulado += dano;
    boss.hp -= dano; if (boss.hp < 0) boss.hp = 0;
    textosFlotantes.push({ texto: dano, color: "#ffcc00", x: x + (Math.random()*40-20), y: y + (Math.random()*40-20), velY: -1 - Math.random(), life: 40, maxLife: 40 });
}

function aplicarDanoHeroe(heroeObj, dano) {
    heroeObj.hp -= dano; heroeObj.shake = 15; heroeObj.flash = 20; screenShake = 15;
    let visual = heroeObj === mephis ? player2Combate : playerCombate;
    textosFlotantes.push({ texto: dano, color: "#ff0000", x: visual.x + visual.sizeX/2, y: visual.y + heroeObj.offsetY - visual.sizeY, velY: -2, life: 60, maxLife: 60 });
    if (heroeObj.hp <= 0) { heroeObj.hp = 0; heroeObj.estado = "CAIDO"; heroeObj.turnosCaido = 3; heroeObj.accion = "CAIDO"; }
}

function comprobarCorteAlEnemigo(wx, wy) {
    if (cooldownGolpe > 0) return;
    if (wx > enemyCombate.x && wx < enemyCombate.x + enemyCombate.sizeX &&
        wy > enemyCombate.y - enemyCombate.sizeY && wy < enemyCombate.y) {
        if (trazoAtaque.length > 2) {
            let p1 = trazoAtaque[trazoAtaque.length - 1];
            let p2 = trazoAtaque[trazoAtaque.length - 3];
            if (Math.hypot(p1.x - p2.x, p1.y - p2.y) > 5) {
                aplicarDanoBoss(15, wx, wy); cooldownGolpe = 12;
            }
        }
    }
}

function iniciarMinijuego(tipo) {
    estadoJuego = tipo;
    timerAtaqueFase = 60 * 5;
    danoAcumulado = 0; cooldownGolpe = 0;
    enemigoGolpeado = false;
    trazoAtaque = []; efectosGolpe = []; textosFlotantes = [];
}

// ================================================================
//  CREACIÓN DE OBSTÁCULOS
//  Para agregar un nuevo tipo de ataque:
//  1. Añade un nuevo "else if (tipo === 'MI_ATAQUE')" aquí
//  2. En el catálogo del enemigo, incluye 'MI_ATAQUE' en su lista
// ================================================================
function crearObstaculo(tipo, targetVisual) {
    let tx = targetVisual.x + targetVisual.sizeX/2;
    let ty = targetVisual.y;
    let obs = { tipo, hit: false, life: 0, warning: 30, targetX: tx, targetY: ty };

    if (tipo === "LLUVIA") {
        obs.x = tx - 12 + (Math.random()*24-12); obs.y = ty - 400;
        obs.width = 25; obs.height = 40; obs.velY = 16; obs.maxLife = 60;
    } else if (tipo === "NOPALAZO") {
        obs.x = enemyCombate.x; obs.y = ty - 35;
        obs.width = 30; obs.height = 30; obs.velX = -18; obs.maxLife = 60;
    } else if (tipo === "PINCHOS") {
        obs.x = tx - 35; obs.y = ty + 5;
        obs.width = 70; obs.height = 0; obs.maxLife = 45;
    }
    return obs;
}


// ================================================================
//  LOOP DE ACTUALIZACIÓN
// ================================================================
function update() {
    // Joystick visible solo en el mapa
    joystickZone.style.display = (estadoJuego === "MUNDO" && esMovil) ? "block" : "none";
    if (estadoJuego !== "MUNDO") { joyVector.x = 0; joyVector.y = 0; }

    // --- MAPA / MUNDO ---
    if (estadoJuego === "MUNDO") {
        playerMundo.x += joyVector.x * playerMundo.speed;
        playerMundo.y += joyVector.y * playerMundo.speed;
        if (keys.ArrowUp   || keys.w) playerMundo.y -= playerMundo.speed;
        if (keys.ArrowDown || keys.s) playerMundo.y += playerMundo.speed;
        if (keys.ArrowLeft || keys.a) playerMundo.x -= playerMundo.speed;
        if (keys.ArrowRight|| keys.d) playerMundo.x += playerMundo.speed;

        if (Math.abs(playerMundo.x - enemyMundo.x) < playerMundo.size &&
            Math.abs(playerMundo.y - enemyMundo.y) < playerMundo.size) {
            // Contacto con el enemigo: iniciar combate
            // Por ahora hardcodeado a C4C_T4C; en un juego completo,
            // cada sprite de enemigo en el mapa tendría su propio ID.
            iniciarCombate("C4C_T4C");

            estadoJuego = "CONGELADO";
            timerShock = 60;
            playerCombate.startX  = playerMundo.x;     playerCombate.x  = playerCombate.startX;
            player2Combate.startX = playerMundo.x - 20; player2Combate.x = player2Combate.startX;
            enemyCombate.startX   = enemyMundo.x;       enemyCombate.x   = enemyCombate.startX;
        }
    }
    else if (estadoJuego === "CONGELADO") {
        timerShock--;
        if (timerShock <= 0) {
            estadoJuego = "TRANSICION"; frameDesliz = 0;
            lookX = 350; lookY = 225; camara.zoom = 1.0;
        }
    }
    else if (estadoJuego === "TRANSICION") {
        frameDesliz++;
        let t = frameDesliz / FRAMES_DESLIZ;
        let ease = 1 - Math.pow(1 - t, 3);
        if (t >= 1) { estadoJuego = "COMBATE_INTRO"; esperandoClic = true; }
        playerCombate.x  = playerCombate.startX  + ease * (playerCombate.targetX  - playerCombate.startX);
        player2Combate.x = player2Combate.startX + ease * (player2Combate.targetX - player2Combate.startX);
        enemyCombate.x   = enemyCombate.startX   + ease * (enemyCombate.targetX   - enemyCombate.startX);
        musicaBatalla.play().catch(e => console.log(e));
    }
    else if (estadoJuego === "FADE_OUT") {
        timerFade--;
        if (timerFade <= 0) resetGame();
    }
    else if (estadoJuego !== "MUNDO" && estadoJuego !== "GAME_OVER") {
        tiempoAnim += 0.15;

        // Física de héroes
        if (mephis.flash > 0) mephis.flash--; if (sarah.flash > 0) sarah.flash--;
        if (mephis.shake > 0.5) mephis.shake *= 0.85; else mephis.shake = 0;
        if (sarah.shake  > 0.5) sarah.shake  *= 0.85; else sarah.shake  = 0;

        [mephis, sarah].forEach(p => {
            if (p.estado !== "VIVO") return;
            p.offsetX += (p.targetOffsetX - p.offsetX) * 0.25;
            p.targetOffsetX *= 0.85;
            p.offsetY += p.velY;
            if (p.offsetY < 0) p.velY += 1.5; else { p.offsetY = 0; p.velY = 0; }
            p.scaleY += (p.targetScaleY - p.scaleY) * 0.3;
            p.targetScaleY += (1 - p.targetScaleY) * 0.15;
        });

        // Textos flotantes
        for (let i = textosFlotantes.length - 1; i >= 0; i--) {
            textosFlotantes[i].y += textosFlotantes[i].velY;
            textosFlotantes[i].life--;
            if (textosFlotantes[i].life <= 0) textosFlotantes.splice(i, 1);
        }

        // --- SELECCIÓN ---
        if (estadoJuego === "COMBATE_SELECCION") {
            if (heroesPendientes.length > 0) {
                let actual = heroesPendientes[0] === "MEPHIS" ? mephis : sarah;
                if (actual.estado === "CAIDO") {
                    registrarAccionJugador("CAIDO");
                } else {
                    let visual = actual === mephis ? player2Combate : playerCombate;
                    targetLookX = visual.x + visual.sizeX/2;
                    targetLookY = visual.y - visual.sizeY/2;
                    targetZoom  = 1.5;
                }
            }

            // Mecánica especial: LADRON_TURNO (solo el boss con esa mecánica)
            if (bossAccionesPendientes > 0 && enemigoActual && enemigoActual.mecanica_especial === "LADRON_TURNO") {
                timerBoss--;
                if (timerBoss <= 0) {
                    let idx = enemigoActual.acciones_por_ronda - bossAccionesPendientes + 1;
                    ordenTurnos.push(enemigoActual.id + "_" + idx);
                    bossAccionesPendientes--;
                    timerBoss = MAX_TIMER_BOSS_NORMAL;
                    impactosBoss.push({
                        x: canvas.width - 175 + (Math.random()*80-40),
                        y: canvas.height - 90  + (Math.random()*40-20),
                        rotacion: Math.random() * Math.PI, frameTexto: 30
                    });
                }
            }
        }

        // --- RESOLUCIÓN ---
        else if (estadoJuego === "COMBATE_RESOLUCION") {
            if (animacionTurno) {
                let objTarget = animacionTurno.targetRef;
                let objVisual = objTarget === mephis ? player2Combate : playerCombate;

                if (animacionTurno.paso === "CARGAR_BOSS") {
                    animacionTurno.timer--;
                    targetLookX = enemyCombate.x + enemyCombate.sizeX/2;
                    targetLookY = enemyCombate.y - enemyCombate.sizeY/2;
                    targetZoom  = 1.4;
                    enemyCombate.shake = (Math.random()*10) - 5;

                    if (animacionTurno.timer <= 0) {
                        enemyCombate.shake = 0;
                        if (objTarget && objTarget.accion === "ESCUDO") {
                            animacionTurno.paso = "IMPACTO_BOSS";
                            mensajeTurno = `¡${objTarget.nombre} aguantó la ráfaga con su escudo!`;
                            objTarget.shake = 5; esperandoClic = true;
                        } else {
                            animacionTurno.paso = "PRE_ESQUIVE";
                            animacionTurno.timer = 60;
                        }
                    }
                }
                else if (animacionTurno.paso === "PRE_ESQUIVE") {
                    targetLookX = objVisual.x + objVisual.sizeX/2;
                    targetLookY = objVisual.y - objVisual.sizeY/2;
                    targetZoom  = 1.4;
                    animacionTurno.timer--;
                    if (animacionTurno.timer <= 0) {
                        animacionTurno.paso  = "ATAQUE_ACTIVO_BOSS";
                        animacionTurno.timer = 150;
                    }
                }
                else if (animacionTurno.paso === "ATAQUE_ACTIVO_BOSS") {
                    targetLookX = objVisual.x + objVisual.sizeX/2;
                    targetLookY = objVisual.y - objVisual.sizeY/2;
                    targetZoom  = 1.3;
                    animacionTurno.timer--;

                    if (animacionTurno.timer === 150 || animacionTurno.timer === 100 || animacionTurno.timer === 50) {
                        let ataques = enemigoActual ? enemigoActual.ataques : ["LLUVIA"];
                        let elegido = ataques[Math.floor(Math.random() * ataques.length)];
                        animacionTurno.obstaculos.push(crearObstaculo(elegido, objVisual));
                        enemyCombate.shake = 10;
                    }

                    let rectPj = {
                        left:   objVisual.x + objTarget.offsetX,
                        right:  objVisual.x + objTarget.offsetX + objVisual.sizeX,
                        top:    objVisual.y + objTarget.offsetY - (objVisual.sizeY * objTarget.scaleY),
                        bottom: objVisual.y + objTarget.offsetY
                    };

                    for (let i = animacionTurno.obstaculos.length - 1; i >= 0; i--) {
                        let obs = animacionTurno.obstaculos[i];
                        if (obs.warning > 0) { obs.warning--; continue; }
                        obs.life++;

                        if      (obs.tipo === "LLUVIA")   obs.y += obs.velY;
                        else if (obs.tipo === "NOPALAZO") obs.x += obs.velX;
                        else if (obs.tipo === "PINCHOS") {
                            if   (obs.life < 10) obs.height = Math.min(30, obs.height + 6);
                            else if (obs.life > 35) obs.height = Math.max(0, obs.height - 6);
                        }

                        if (obs.life > obs.maxLife) { animacionTurno.obstaculos.splice(i, 1); continue; }

                        if (!obs.hit && obs.height > 0) {
                            let rL = obs.x, rR = obs.x + obs.width;
                            let rT = obs.y - obs.height, rB = obs.y;
                            if (rectPj.left < rR && rectPj.right > rL && rectPj.top < rB && rectPj.bottom > rT) {
                                obs.hit = true;
                                let esDodge = Math.abs(objTarget.offsetX) > 20 || objTarget.offsetY < -10 || objTarget.scaleY < 0.8;
                                let dmg = esDodge
                                    ? (enemigoActual ? enemigoActual.dano_esquivado : 500)
                                    : (enemigoActual ? enemigoActual.dano_normal    : 1000);
                                aplicarDanoHeroe(objTarget, dmg);
                            }
                        }
                    }

                    if (animacionTurno.timer <= 0) {
                        animacionTurno.paso  = "FIN_ESQUIVE";
                        animacionTurno.timer = 30;
                    }
                }
                else if (animacionTurno.paso === "FIN_ESQUIVE") {
                    animacionTurno.timer--;
                    if (animacionTurno.timer <= 0) terminarTurnoBoss();
                }
                else if (animacionTurno.paso === "MENSAJE_HEROE" || animacionTurno.paso === "MENSAJE") {
                    targetLookX = animacionTurno.targetVisual.x + animacionTurno.targetVisual.sizeX/2;
                    targetLookY = animacionTurno.targetVisual.y - animacionTurno.targetVisual.sizeY/2;
                    targetZoom  = 1.4;
                }
            } else {
                targetLookX = 350; targetLookY = 225; targetZoom = 1.0;
            }
        }

        // --- MINIJUEGO DE ATAQUE ---
        else if (estadoJuego.startsWith("ATAQUE_")) {
            targetLookX = enemyCombate.x + enemyCombate.sizeX/2;
            targetLookY = enemyCombate.y - enemyCombate.sizeY/2;
            targetZoom  = 1.3;
            timerAtaqueFase--;
            if (cooldownGolpe > 0) cooldownGolpe--;
            for (let i = trazoAtaque.length-1;  i >= 0; i--) { trazoAtaque[i].life--;  if (trazoAtaque[i].life  <= 0) trazoAtaque.splice(i, 1); }
            for (let i = efectosGolpe.length-1; i >= 0; i--) { efectosGolpe[i].life--; if (efectosGolpe[i].life <= 0) efectosGolpe.splice(i, 1); }
            if (enemigoGolpeado) { timerGolpe--; if (timerGolpe <= 0) enemigoGolpeado = false; }
            if (timerAtaqueFase <= 0) {
                estadoJuego = "MOSTRAR_DANO"; timerMostrarDano = 90;
                isDragging = false; enemigoGolpeado = false;
            }
        }
        else if (estadoJuego === "MOSTRAR_DANO") {
            targetLookX = 350; targetLookY = 225; targetZoom = 1.0;
            timerMostrarDano--;
            if (timerMostrarDano <= 0) { estadoJuego = "COMBATE_RESOLUCION"; turnoActualIndex++; ejecutarTurno(); }
        }
        else { targetLookX = 350; targetLookY = 225; targetZoom = 1.0; }

        // Impactos decorativos del boss
        for (let imp of impactosBoss) { if (imp.frameTexto > 0) imp.frameTexto--; }

        // Actualizar cámara
        lookX += (targetLookX - lookX) * 0.1;
        lookY += (targetLookY - lookY) * 0.1;
        camara.zoom += (targetZoom - camara.zoom) * 0.1;
        camara.tiempo++;

        let bX = (canvas.width/2)  - (lookX * camara.zoom);
        let bY = (canvas.height/2) - (lookY * camara.zoom);
        let shX = 0, shY = 0;
        if (screenShake > 0.5) {
            shX = (Math.random()-0.5) * screenShake;
            shY = (Math.random()-0.5) * screenShake;
            screenShake *= 0.9;
        }
        camara.x = bX + Math.sin(camara.tiempo * camara.freqX) * camara.amp + shX;
        camara.y = bY + Math.cos(camara.tiempo * camara.freqY) * camara.amp * 0.7 + shY;
    }
}


// ================================================================
//  LOOP DE DIBUJO
// ================================================================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- MAPA ---
    if (estadoJuego === "MUNDO" || estadoJuego === "CONGELADO") {
        ctx.fillStyle = estadoJuego === "MUNDO" ? "#2d4a22" : "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = playerMundo.color;
        ctx.fillRect(playerMundo.x, playerMundo.y, playerMundo.size, playerMundo.size);
        ctx.fillStyle = enemyMundo.color;
        ctx.fillRect(enemyMundo.x,  enemyMundo.y,  enemyMundo.size,  enemyMundo.size);
        if (textoOverworld !== "" && estadoJuego === "MUNDO") {
            ctx.fillStyle = "white"; ctx.font = "bold 16px Courier"; ctx.textAlign = "center";
            ctx.fillText(textoOverworld, enemyMundo.x + enemyMundo.size/2, enemyMundo.y - 15);
            ctx.textAlign = "left";
        }
    }
    // --- GAME OVER ---
    else if (estadoJuego === "GAME_OVER") {
        ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "red"; ctx.font = "bold 60px Courier"; ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = "white"; ctx.font = "20px Courier";
        ctx.fillText("Toca para reiniciar", canvas.width/2, canvas.height/2 + 40);
        ctx.textAlign = "left";
    }
    // --- COMBATE ---
    else {
        ctx.save();
        ctx.translate(camara.x, camara.y);
        ctx.scale(camara.zoom, camara.zoom);

        drawEscenaCombate();

        // Overlay de esquiva (circulo de luz alrededor del personaje)
        if (estadoJuego === "COMBATE_RESOLUCION" && animacionTurno &&
           (animacionTurno.paso === "PRE_ESQUIVE" || animacionTurno.paso === "ATAQUE_ACTIVO_BOSS" || animacionTurno.paso === "FIN_ESQUIVE")) {

            let tVis = animacionTurno.targetRef === mephis ? player2Combate : playerCombate;
            let cx = tVis.x + tVis.sizeX/2, cy = tVis.y - tVis.sizeY/2;

            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.beginPath();
            ctx.rect(-1000, -1000, 3000, 3000);
            ctx.arc(cx, cy, 80, 0, Math.PI*2, true);
            ctx.fill();

            if (animacionTurno.paso === "PRE_ESQUIVE") {
                ctx.fillStyle = "white"; ctx.strokeStyle = "red"; ctx.lineWidth = 3;
                ctx.font = "bold 30px Courier"; ctx.textAlign = "center";
                ctx.strokeText("¡ESQUIVA!", cx, cy-80);
                ctx.fillText("¡ESQUIVA!", cx, cy-80);
                ctx.textAlign = "left";
            }
        }

        // Obstáculos
        if (estadoJuego === "COMBATE_RESOLUCION" && animacionTurno &&
           (animacionTurno.paso === "ATAQUE_ACTIVO_BOSS" || animacionTurno.paso === "FIN_ESQUIVE")) {
            drawObstaculos();
        }

        // Trazo de Mephis
        if (estadoJuego === "ATAQUE_MEPHIS" && trazoAtaque.length > 1) {
            for (let i = 1; i < trazoAtaque.length; i++) {
                let l = trazoAtaque[i].life / trazoAtaque[i].maxLife;
                ctx.beginPath();
                ctx.moveTo(trazoAtaque[i-1].x, trazoAtaque[i-1].y);
                ctx.lineTo(trazoAtaque[i].x,   trazoAtaque[i].y);
                ctx.strokeStyle = `rgba(255, 0, 85, ${l})`;
                ctx.lineWidth = (1 + l*8) / camara.zoom;
                ctx.lineCap = "round"; ctx.stroke();
            }
        }

        // Textos flotantes de daño
        for (let tf of textosFlotantes) {
            let alfa = tf.life / tf.maxLife;
            ctx.fillStyle = tf.color; ctx.strokeStyle = `rgba(0,0,0,${alfa})`;
            ctx.lineWidth = 3; ctx.font = `bold ${15 + alfa*10}px Courier`;
            ctx.globalAlpha = alfa;
            ctx.strokeText(tf.texto, tf.x, tf.y);
            ctx.fillText(tf.texto, tf.x, tf.y);
            ctx.globalAlpha = 1.0;
        }

        // Total de daño al final del minijuego
        if (estadoJuego === "MOSTRAR_DANO") {
            let bx = enemyCombate.x + enemyCombate.sizeX/2;
            let by = enemyCombate.y - enemyCombate.sizeY - 30;
            ctx.textAlign = "center"; ctx.fillStyle = "#ffcc00";
            ctx.strokeStyle = "black"; ctx.lineWidth = 4;
            ctx.font = "bold 26px Courier";
            ctx.strokeText("TOTAL: " + danoAcumulado, bx, by);
            ctx.fillText("TOTAL: " + danoAcumulado, bx, by);
            ctx.textAlign = "left";
        }

        ctx.restore();

        // UI encima de la cámara
        drawPlayerHP();
        drawUIBossHealth();

        if      (estadoJuego === "COMBATE_SELECCION")  drawUISeleccion();
        else if (estadoJuego === "COMBATE_RESOLUCION" ||
                 estadoJuego === "MOSTRAR_DANO")        drawTurnTimeline();
        else if (estadoJuego.startsWith("ATAQUE_"))    drawUIAtaque();

        drawImpactosBoss();

        // Fade a negro (al volver al mapa)
        if (estadoJuego === "FADE_OUT") {
            let alpha = 1 - (timerFade / 60);
            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    updateDialogHTML();
}

// ================================================================
//  FUNCIONES DE DIBUJO DEL COMBATE
// ================================================================

function drawEscenaCombate() {
    // Usar el fondo del enemigo actual, o un fondo genérico si no hay
    let nombreFondo = enemigoActual ? enemigoActual.fondo : "GENERICO";
    drawFondo(nombreFondo, ctx, canvas);

    let respira = Math.sin(tiempoAnim) * 3;

    // --- Mephis ---
    let p2x = player2Combate.x + (mephis.shake || 0) + mephis.offsetX;
    let altoM = (mephis.estado === "CAIDO" ? player2Combate.sizeY/2 : player2Combate.sizeY) * mephis.scaleY;
    let p2y   = player2Combate.y + mephis.offsetY;
    let flashM = mephis.flash > 0 && Math.floor(mephis.flash/3) % 2 === 0;
    ctx.fillStyle = flashM ? "white" : (mephis.estado === "CAIDO" ? "#442222" : player2Combate.color);
    ctx.fillRect(p2x, p2y - altoM - (mephis.estado==="CAIDO"?0:respira), player2Combate.sizeX, altoM + (mephis.estado==="CAIDO"?0:respira));

    // --- Sarah ---
    let sx    = playerCombate.x + (sarah.shake || 0) + sarah.offsetX;
    let altoS = (sarah.estado  === "CAIDO" ? playerCombate.sizeY/2 : playerCombate.sizeY) * sarah.scaleY;
    let s_y   = playerCombate.y + sarah.offsetY;
    let flashS = sarah.flash > 0 && Math.floor(sarah.flash/3) % 2 === 0;
    ctx.fillStyle = flashS ? "white" : (sarah.estado === "CAIDO" ? "#224444" : playerCombate.color);
    ctx.fillRect(sx, s_y - altoS - (sarah.estado==="CAIDO"?0:respira), playerCombate.sizeX, altoS + (sarah.estado==="CAIDO"?0:respira));

    // --- Enemigo ---
    let bx = enemyCombate.x + (enemyCombate.shake || 0);
    ctx.fillStyle = (enemigoGolpeado && timerGolpe > 0) ? "white" : enemyCombate.color;
    ctx.fillRect(bx, enemyCombate.y - enemyCombate.sizeY - respira, enemyCombate.sizeX, enemyCombate.sizeY + respira);

    // Efectos de golpe (Sarah)
    for (let ef of efectosGolpe) {
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, 5 + (ef.maxLife - ef.life)*3, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,100,${ef.life/ef.maxLife})`; ctx.fill();
    }
}

function drawCactus(x, y, scale=1, rot=0) {
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.scale(scale,scale);
    ctx.fillStyle = "#87e376";
    ctx.fillRect(-7.5,-40,15,40);
    ctx.fillRect(-22.5,-20,15,10);
    ctx.fillRect(7.5,-30,15,10);
    ctx.restore();
}

function drawObstaculos() {
    animacionTurno.obstaculos.forEach(obs => {
        if (obs.warning > 0) {
            let op = (Math.floor(tiempoAnim*4)%2===0) ? 0.8 : 0.4;
            ctx.fillStyle = `rgba(255,0,0,${op})`; ctx.strokeStyle = "red"; ctx.lineWidth = 2;
            if      (obs.tipo === "LLUVIA")   { ctx.fillRect(obs.x-5, obs.targetY-400, obs.width+10, 400); ctx.strokeRect(obs.x-5, obs.targetY-400, obs.width+10, 400); }
            else if (obs.tipo === "NOPALAZO") { ctx.fillRect(obs.targetX-200, obs.y-obs.height/2-5, 400, obs.height+10); ctx.strokeRect(obs.targetX-200, obs.y-obs.height/2-5, 400, obs.height+10); }
            else if (obs.tipo === "PINCHOS")  { ctx.fillRect(obs.x-5, obs.targetY-15, obs.width+10, 15); ctx.strokeRect(obs.x-5, obs.targetY-15, obs.width+10, 15); }
        } else {
            if      (obs.tipo === "LLUVIA")   drawCactus(obs.x+obs.width/2, obs.y, 0.8, Math.PI);
            else if (obs.tipo === "NOPALAZO") drawCactus(obs.x+obs.width/2, obs.y-obs.height/2, 0.8, tiempoAnim*5);
            else if (obs.tipo === "PINCHOS")  {
                ctx.fillStyle = "silver";
                for (let i=0; i<3; i++) {
                    ctx.beginPath();
                    let bx2 = obs.x+(i*23), tipy = obs.y-obs.height;
                    ctx.moveTo(bx2,obs.y); ctx.lineTo(bx2+11,tipy); ctx.lineTo(bx2+22,obs.y); ctx.fill();
                }
            }
        }
    });
}

// ================================================================
//  DIÁLOGO HTML
// ================================================================
function updateDialogHTML() {
    const dBox  = document.getElementById("dialogBox");
    const dName = document.getElementById("dialogName");
    const dText = document.getElementById("dialogText");
    const dIcon = document.getElementById("dialogIcon");

    if (estadoJuego === "GAME_OVER" || estadoJuego === "MUNDO" ||
        estadoJuego === "CONGELADO"  || estadoJuego === "FADE_OUT") {
        dBox.style.visibility = "hidden"; return;
    }

    if (estadoJuego === "COMBATE_INTRO") {
        dBox.style.visibility = "visible";
        dName.innerText = enemigoActual ? enemigoActual.nombre : "???";
        dText.innerText = enemigoActual ? enemigoActual.texto_intro : "...";
    } else if (estadoJuego === "VICTORIA") {
        dBox.style.visibility = "visible";
        dName.innerText = enemigoActual ? enemigoActual.nombre : "???";
        dText.innerText = mensajeTurno;
        dIcon.style.display = esperandoClic ? "block" : "none";
        musicaBatalla.pause(); musicaBatalla.currentTime = 0;
    } else if (mensajeTurno !== "") {
        dBox.style.visibility = "visible";
        let nick = "SISTEMA";
        if (ordenTurnos[turnoActualIndex]) {
            let t = ordenTurnos[turnoActualIndex];
            if      (t === "MEPHIS") nick = "MEPHIS";
            else if (t === "SARAH")  nick = "SARAH";
            else                     nick = enemigoActual ? enemigoActual.nombre : "???";
        }
        dName.innerText = nick.toUpperCase();
        dText.innerText = mensajeTurno;
        dIcon.style.display = esperandoClic ? "block" : "none";
    } else {
        dBox.style.visibility = "hidden";
    }
}

// ================================================================
//  UI: BARRAS DE HP, COLA DE TURNOS, BOTONES
// ================================================================
function drawPlayerHP() {
    drawHPCircle(50, 60,  mephis);
    drawHPCircle(50, 140, sarah);
}

function drawHPCircle(cx, cy, char) {
    ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fill();
    ctx.lineWidth = 6; ctx.strokeStyle = "#333"; ctx.stroke();
    if (char.hp > 0) {
        ctx.beginPath(); ctx.arc(cx,cy,30,-Math.PI/2,-Math.PI/2+(Math.PI*2*(char.hp/char.maxHp)));
        ctx.strokeStyle = char.color; ctx.stroke();
    }
    ctx.fillStyle = "white"; ctx.font = "bold 12px Courier";
    ctx.fillText(char.nombre.substring(0,3).toUpperCase(), cx-12, cy-5);
    ctx.font = "10px Courier";
    ctx.fillText(char.estado === "CAIDO" ? "UFF" : `${char.hp}`, cx-12, cy+12);
    if (char.estado === "CAIDO") {
        ctx.strokeStyle = "red"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(cx-15,cy-15); ctx.lineTo(cx+15,cy+15); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+15,cy-15); ctx.lineTo(cx-15,cy+15); ctx.stroke();
    }
}

function drawUIBossHealth() {
    if (!enemigoActual) return;
    let barra = enemigoActual.barra_hp || 1000;
    let barrasRest = Math.ceil(boss.hp / barra);
    let hpEnBarra  = boss.hp % barra; if (hpEnBarra === 0 && boss.hp > 0) hpEnBarra = barra;
    let p = hpEnBarra / barra;
    let colores = ["#00ffff","#00ff00","#ffff00","#ff8800","#ff0000"];
    let colorAct = colores[Math.max(0, barrasRest-1)];

    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(canvas.width-420, 10, 400, 35);
    ctx.fillStyle = colorAct; ctx.fillRect(canvas.width-415, 15, 390*p, 15);
    ctx.fillStyle = "white"; ctx.font = "bold 14px Courier";
    ctx.fillText(`${enemigoActual.nombre} [x${barrasRest}] HP: ${boss.hp}/${enemigoActual.hp}`, canvas.width-410, 42);
}

function drawUISeleccion() {
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    if (heroesPendientes.length > 0) {
        let para = heroesPendientes[0] === "MEPHIS" ? "Mephis" : "Sarah";
        ctx.fillStyle = "white"; ctx.font = "bold 24px Courier";
        ctx.fillText(`¿Qué hará ${para}?`, canvas.width/2-120, canvas.height/2-60);
        ctx.fillStyle = "rgba(0,50,150,0.8)";  ctx.fillRect(50, canvas.height-150, 250, 120);
        ctx.fillStyle = "rgba(150,0,0,0.8)";   ctx.fillRect(canvas.width-300, canvas.height-150, 250, 120);
        ctx.fillStyle = "white"; ctx.font = "bold 30px Courier";
        ctx.fillText("ESCUDO", 110, canvas.height-85);
        ctx.fillText("ATAQUE", canvas.width-240, canvas.height-85);
    }
    drawTurnTimeline();

    // Indicador del LADRON_TURNO (solo si tiene esa mecánica)
    if (bossAccionesPendientes > 0 && enemigoActual && enemigoActual.mecanica_especial === "LADRON_TURNO") {
        let pct = timerBoss / (bossAccionesPendientes === enemigoActual.acciones_por_ronda ? MAX_TIMER_BOSS_RAPIDO : MAX_TIMER_BOSS_NORMAL);
        let longBarra = 250 * pct;
        ctx.strokeStyle = "#ffff00"; ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(canvas.width-300+125-longBarra/2, canvas.height-155);
        ctx.lineTo(canvas.width-300+125+longBarra/2, canvas.height-155);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(canvas.width-175, canvas.height-175, 20, 0, Math.PI*2);
        ctx.fillStyle = "red"; ctx.fill(); ctx.stroke();
        ctx.fillStyle = "black"; ctx.font = "12px Courier";
        ctx.fillText(">:)", canvas.width-186, canvas.height-171);
    }
}

function drawUIAtaque() {
    drawTurnTimeline();
    let txt = estadoJuego === "ATAQUE_MEPHIS" ? "¡CORTA!" : "¡GOLPEA!";
    let totalF = 60*5;
    if (timerAtaqueFase > totalF-45) {
        ctx.textAlign = "center"; ctx.font = "bold 60px Courier";
        ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 6;
        ctx.strokeText(txt, canvas.width/2, canvas.height/2);
        ctx.fillText(txt,   canvas.width/2, canvas.height/2);
        ctx.textAlign = "left";
    } else {
        let segs = Math.ceil(timerAtaqueFase/60);
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(canvas.width-120, 60, 100, 40);
        ctx.fillStyle = segs <= 2 ? "#ff0000" : "#ffff00";
        ctx.font = "bold 24px Courier"; ctx.fillText(`00:0${segs}`, canvas.width-105, 88);
    }
}

function drawTurnTimeline() {
    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(canvas.width/2-130, 60, 260, 40);
    ctx.fillStyle = "white"; ctx.font = "bold 12px Courier"; ctx.fillText("COLA:", canvas.width/2-110, 85);
    for (let i = 0; i < 4; i++) {
        let cx2 = canvas.width/2 - 40 + (i*35), cy2 = 80;
        ctx.beginPath(); ctx.arc(cx2, cy2, 10, 0, Math.PI*2);
        if (i < ordenTurnos.length) {
            let id = ordenTurnos[i];
            ctx.fillStyle = coloresID[id] || "#888"; ctx.fill();
            let char = id === "MEPHIS" ? mephis : (id === "SARAH" ? sarah : null);
            if (char && char.estado === "CAIDO") {
                ctx.strokeStyle = "rgba(255,0,0,0.8)"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(cx2-7,cy2-7); ctx.lineTo(cx2+7,cy2+7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx2+7,cy2-7); ctx.lineTo(cx2-7,cy2+7); ctx.stroke();
            }
        } else { ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fill(); }
        ctx.strokeStyle = (i === turnoActualIndex && estadoJuego === "COMBATE_RESOLUCION") ? "yellow" : "white";
        ctx.lineWidth = 2; ctx.stroke();
    }
}

function drawImpactosBoss() {
    for (let imp of impactosBoss) {
        ctx.save(); ctx.translate(imp.x, imp.y); ctx.rotate(imp.rotacion);
        ctx.strokeStyle = "rgba(255,255,255,0.9)"; ctx.lineWidth = 1;
        ctx.beginPath();
        for (let j=0; j<5; j++) {
            let ang = (Math.PI*2/5)*j;
            ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*16, Math.sin(ang)*16);
            ctx.moveTo(Math.cos(ang)*8, Math.sin(ang)*8); ctx.lineTo(Math.cos(ang+0.5)*14, Math.sin(ang+0.5)*14);
        }
        ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fillStyle = "black"; ctx.fill();
        ctx.restore();
        if (imp.frameTexto > 0) { ctx.fillStyle = "yellow"; ctx.font = "bold 22px Courier"; ctx.fillText("¡TAAS!", imp.x-30, imp.y-20-(30-imp.frameTexto)); }
    }
}

// ================================================================
//  ARRANQUE
// ================================================================
function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();

    </script>

    <div class="dr"><label>Acciones por ronda</label>
        <select id="dp-acciones">
            <option value="1">1 ataque por ronda</option>
            <option value="2" selected>2 ataques por ronda</option>
            <option value="3">3 ataques por ronda</option>
        </select>
    </div>
    <div class="dr"><label>Ataques disponibles</label>
        <div class="datk">
            <label><input type="checkbox" id="atk-lluvia" checked> LLUVIA</label>
            <label><input type="checkbox" id="atk-nopalazo" checked> NOPALAZO</label>
            <label><input type="checkbox" id="atk-pinchos" checked> PINCHOS</label>
        </div>
    </div>
    <div class="d2c">
        <div class="dr"><label>Daño sin esquivar</label><input type="number" id="dp-dano-n" value="800" min="0"></div>
        <div class="dr"><label>Daño esquivando</label><input type="number" id="dp-dano-e" value="300" min="0"></div>
    </div>
    <div class="dr"><label>Fondo del combate</label>
        <select id="dp-fondo">
            <option value="DESIERTO">DESIERTO (cálido)</option>
            <option value="BOSQUE">BOSQUE (verde/azul)</option>
            <option value="GENERICO">GENERICO (oscuro)</option>
        </select>
    </div>
    <div class="dr"><label>Archivo de música (.mp3)</label><input type="text" id="dp-musica" value="rodeo-de-c4c.mp3"></div>
    <div class="dr"><label>Texto de intro (lo que dice el enemigo)</label><textarea id="dp-intro">¡Soy un enemigo de prueba!</textarea></div>
    <div class="dr"><label>Texto de victoria (si lo derrotas)</label><input type="text" id="dp-victoria" value="...no puede ser."></div>
    <div id="dp-msg" style="display:none;padding:8px 12px;border-radius:4px;font-size:12px;margin-top:8px;"></div>
    <button class="dpbtn" onclick="probarEnemigoPersonalizado()">▶ CREAR Y PROBAR ESTE ENEMIGO</button>
</div>

<div style="padding:12px 16px;color:#444;font-size:11px;line-height:1.6">
    Panel de debug — solo para ti durante el desarrollo.<br>
    Los enemigos creados aquí se agregan al catálogo<br>mientras la pestaña esté abierta.
</div>
</div>

<script>
function toggleDebugPanel() {
    var p = document.getElementById("debugPanel");
    var open = p.style.display === "flex";
    p.style.display = open ? "none" : "flex";
    if (!open) renderCatalogList();
}

function renderCatalogList() {
    var list = document.getElementById("dp-catalog-list");
    list.innerHTML = "";
    Object.keys(CATALOGO_ENEMIGOS).forEach(function(id) {
        var e = CATALOGO_ENEMIGOS[id];
        var card = document.createElement("div");
        card.className = "ecard";
        card.innerHTML =
            '<div class="ecard-dot" style="background:'+e.color+'"></div>'+
            '<div class="ecard-info">'+
                '<div class="ecard-name">'+e.nombre+'</div>'+
                '<div class="ecard-sub">HP: '+e.hp+' | '+e.acciones_por_ronda+' acc/ronda | '+(e.mecanica_especial||"sin mecánica")+'</div>'+
            '</div>'+
            '<button class="ecard-btn" onclick="forzarCombate(\''+id+'\')">▶ PROBAR</button>';
        list.appendChild(card);
    });
}

function forzarCombate(idEnemigo) {
    var datos = CATALOGO_ENEMIGOS[idEnemigo];
    if (!datos) { mostrarMsgDebug("Enemigo no encontrado: "+idEnemigo, "error"); return; }
    mephis = crearEstadoHeroe(DATOS_HEROES["MEPHIS"]);
    sarah  = crearEstadoHeroe(DATOS_HEROES["SARAH"]);
    impactosBoss=[]; trazoAtaque=[]; efectosGolpe=[]; textosFlotantes=[];
    animacionTurno=null; isDragging=false;
    camara.zoom=1; lookX=350; lookY=225; screenShake=0;
    playerCombate.x  = playerCombate.targetX;
    player2Combate.x = player2Combate.targetX;
    enemyCombate.x   = enemyCombate.targetX;
    iniciarCombate(idEnemigo);
    estadoJuego="COMBATE_INTRO"; esperandoClic=true;
    document.getElementById("debugPanel").style.display="none";
}

function probarEnemigoPersonalizado() {
    var id = document.getElementById("dp-id").value.trim().replace(/\s/g,"_").toUpperCase();
    if (!id) { mostrarMsgDebug("El ID no puede estar vacío","error"); return; }
    var ataques=[];
    if (document.getElementById("atk-lluvia").checked)   ataques.push("LLUVIA");
    if (document.getElementById("atk-nopalazo").checked) ataques.push("NOPALAZO");
    if (document.getElementById("atk-pinchos").checked)  ataques.push("PINCHOS");
    if (!ataques.length) { mostrarMsgDebug("Elige al menos un ataque","error"); return; }
    var col = document.getElementById("dp-color-txt").value.trim();
    if (!col.startsWith("#")) col="#"+col;
    CATALOGO_ENEMIGOS[id] = {
        id: id,
        nombre:            document.getElementById("dp-nombre").value.trim()||id,
        hp:                parseInt(document.getElementById("dp-hp").value)||1000,
        barra_hp:          parseInt(document.getElementById("dp-barra").value)||1000,
        color:             col,
        tamano:            {x:parseInt(document.getElementById("dp-sx").value)||40, y:parseInt(document.getElementById("dp-sy").value)||80},
        musica:            document.getElementById("dp-musica").value.trim()||"rodeo-de-c4c.mp3",
        fondo:             document.getElementById("dp-fondo").value,
        mecanica_especial: document.getElementById("dp-mecanica").value||null,
        acciones_por_ronda:parseInt(document.getElementById("dp-acciones").value)||1,
        ataques:           ataques,
        texto_intro:       document.getElementById("dp-intro").value||"...",
        texto_victoria:    document.getElementById("dp-victoria").value||"...",
        texto_revancha:    "¿Otra vez?",
        dano_normal:       parseInt(document.getElementById("dp-dano-n").value)||800,
        dano_esquivado:    parseInt(document.getElementById("dp-dano-e").value)||300,
    };
    coloresID[id+"_1"]=col; coloresID[id+"_2"]=col; coloresID[id+"_3"]=col;
    mostrarMsgDebug("¡'"+CATALOGO_ENEMIGOS[id].nombre+"' creado! Iniciando...","ok");
    setTimeout(function(){ forzarCombate(id); }, 700);
}

function mostrarMsgDebug(txt, tipo) {
    var m=document.getElementById("dp-msg");
    m.textContent=txt; m.style.display="block";
    m.style.background = tipo==="ok"?"#003300":"#330000";
    m.style.color       = tipo==="ok"?"#00ff00":"#ff4444";
    m.style.border      = "1px solid "+(tipo==="ok"?"#00ff00":"#ff4444");
    if (tipo==="ok") setTimeout(function(){ m.style.display="none"; },3000);
}
</script>
</body>
</html>
