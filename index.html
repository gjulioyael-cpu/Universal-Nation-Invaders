<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="U.N.I. Game">
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <title>U.N.I.</title>
    <style>
        /* Aquí se quedan todos tus estilos visuales (CSS) */
        body { 
            margin: 0; background-color: #111; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw;
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; 
        }
        #gameWrapper { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; position: relative; 
        }
        canvas { 
            background-color: #000; border: 4px solid #fff; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); 
            display: block; touch-action: none; 
            max-width: 100%; max-height: 100%; width: 100vw; height: 100vh; object-fit: contain;
        }
        #dialogBox { 
            width: 90%; max-width: 708px; height: 120px; 
            background-color: rgba(0, 0, 0, 0.95); border: 4px solid #fff; 
            box-sizing: border-box; padding: 15px 20px; 
            position: absolute; bottom: 20px; visibility: hidden; z-index: 2000;
        }
        #dialogBox::after { content: ""; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid #fff; pointer-events: none; }
        #dialogName { color: #ffcc00; font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        #dialogText { color: white; font-size: 16px; white-space: pre-wrap; }
        #dialogIcon { color: white; font-size: 20px; position: absolute; bottom: 15px; right: 25px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        #joystickZone {
            position: absolute; bottom: 150px; left: 20px; width: 120px; height: 120px;
            background-color: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; z-index: 1000; display: none; touch-action: none;
        }
        #joystickKnob {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background-color: rgba(0,255,255,0.6); border-radius: 50%;
            pointer-events: none; box-shadow: 0 0 15px rgba(0,255,255,0.4);
            transition: transform 0.05s ease-out; 
        }

        /* BOTÓN Y CAJÓN DE PARTY */
        #btnPartyUI {
            position: fixed; top: 16px; left: 16px; z-index: 5000;
            background: rgba(0,0,0,0.8); border: 2px solid #fff; color: #fff;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 16px;
            padding: 10px 15px; border-radius: 8px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        #btnPartyUI:hover { background: #fff; color: #000; }
        #partyDrawer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 30, 0.95); z-index: 8000; display: none;
            flex-direction: column; padding: 60px 20px 20px 20px; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        .party-close-btn { position: absolute; top: 20px; right: 30px; font-size: 30px; color: white; cursor: pointer; font-weight: bold; }
        .party-section-title { text-align: center; color: #0ff; font-size: 18px; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }
        #partySlots { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .party-slot { width: 90px; height: 130px; border: 3px dashed #555; border-radius: 10px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; }
        .party-slot.magnet-hover { border-color: #0ff; background: rgba(0, 255, 255, 0.2); transform: scale(1.05); }
        #partyReserve { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; border-top: 2px solid #333; flex: 1; overflow-y: auto; }
        .hero-card { width: 90px; height: 130px; border: 2px solid #ccc; border-radius: 10px; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 15px 5px; box-sizing: border-box; cursor: grab; touch-action: none; user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .hero-card:active { cursor: grabbing; opacity: 0.9; }
        .hero-card-color { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; }
        .hero-card-name { font-size: 12px; font-weight: bold; text-align: center; color: white; word-wrap: break-word; }
        @keyframes brinquitoAcomodo { 0% { transform: scale(1.1) translateY(-10px); } 50% { transform: scale(0.9) translateY(5px); } 100% { transform: scale(1) translateY(0); } }
        .brinquito { animation: brinquitoAcomodo 0.35s ease-out; }

        /* PANEL DE DEBUG */
        #debugBtn {
            position: fixed; bottom: 16px; right: 16px; z-index: 9000;
            background: #222; border: 2px solid #0ff; color: #0ff;
            font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold;
            padding: 8px 14px; cursor: pointer; border-radius: 6px;
        }
        #debugPanel { position: fixed; top: 0; right: 0; bottom: 0; z-index: 8999; width: 340px; max-width: 95vw; background: rgba(10,10,20,0.97); border-left: 2px solid #0ff; overflow-y: auto; display: none; flex-direction: column; font-family: 'Courier New', monospace; font-size: 13px; color: #ccc; }
        #debugPanel.open { display: flex; }
        .dp-header { background: #0ff; color: #000; font-weight: bold; padding: 12px 16px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 1; }
        .dp-section { padding: 12px 16px; border-bottom: 1px solid #333; }
        .dp-section h3 { color: #0ff; margin: 0 0 10px 0; }
        .dr { display: flex; flex-direction: column; margin-bottom: 8px; }
        .dr input, .dr select { background: #111; border: 1px solid #444; color: #eee; padding: 6px; width: 100%; box-sizing: border-box; }
        .dp-probar-btn { width: 100%; padding: 12px; margin-top: 6px; background: #00cc00; color: #000; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div id="gameWrapper">
    <canvas id="gameCanvas" width="700" height="450"></canvas>
    <div id="dialogBox">
        <div id="dialogName">NOMBRE</div>
        <div id="dialogText">Texto...</div>
        <div id="dialogIcon">▼</div>
    </div>
    <div id="joystickZone"><div id="joystickKnob"></div></div>
</div>

<div id="btnPartyUI" onclick="abrirCajonParty()">👥 PARTY</div>

<div id="partyDrawer">
    <div class="party-close-btn" onclick="cerrarCajonParty()">✕</div>
    <div class="party-section-title">Party Activa (Máx 4)</div>
    <div id="partySlots"></div>
    <div class="party-section-title">Reserva</div>
    <div id="partyReserve"></div>
</div>

<button id="debugBtn" onclick="toggleDebugPanel()">⚙ DEBUG</button>
<div id="debugPanel">
    <div class="dp-header">⚙ MODO DEBUG — U.N.I.<span class="dp-close" onclick="toggleDebugPanel()" style="cursor:pointer;font-size:20px;">✕</span></div>
    
    <div class="dp-section">
        <h3>📋 ENEMIGOS EN EL CATÁLOGO</h3>
        <div id="dp-catalog-list"></div>
    </div>
    
    <div class="dp-section">
        <h3>👥 PRUEBAS DE PARTY</h3>
        <button class="dp-probar-btn" style="background:#44aaff;" onclick="testAgregarDummys()">➕ AGREGAR DUMMYS</button>
    </div>
    
    <div class="dp-section">
        <h3>✏️ CREAR ENEMIGO AVANZADO</h3>
        <div class="dr"><label>ID</label><input type="text" id="dp-id" value="TEST"></div>
        <div class="dr"><label>Nombre</label><input type="text" id="dp-nombre" value="Prueba"></div>
        <div class="dr"><label>HP</label><input type="number" id="dp-hp" value="1000"></div>
        
        <div style="display:flex; gap:10px;">
            <div class="dr" style="flex:1;"><label>Ancho (sx)</label><input type="number" id="dp-sx" value="40"></div>
            <div class="dr" style="flex:1;"><label>Alto (sy)</label><input type="number" id="dp-sy" value="80"></div>
        </div>
        
       <div class="dr">
            <label>🎵 Música de Fondo</label>
            <select id="dp-musica">
                <option value="rodeo-de-c4c.mp3">Rodeo de C4C (Combate Boss)</option>
                <option value="bosque.mp3">Bosque (Combate Normal)</option>
                <option value="desierto.mp3">Desierto (Tema Épico)</option>
                <option value="balazo.mp3">Balazo (Efecto Especial)</option>
            </select>
            <button class="dp-probar-btn" onclick="cambiarMusicaDebug()">▶ Escuchar Música Ahora</button>
        </div>

        </div>
        <div class="dr"><label>Fondo</label><select id="dp-fondo"><option value="GENERICO">GENERICO</option><option value="DESIERTO">DESIERTO</option><option value="BOSQUE">BOSQUE</option></select></div>
        <div class="dr"><label>Tipo Combate</label><select id="dp-tipo-combate"><option value="NORMAL">NORMAL</option><option value="BOSS">BOSS</option></select></div>
        <div class="dr"><label>Habilidad Pasiva</label><select id="dp-habilidad"><option value="">Ninguna</option><option value="EL_MAS_RAPIDO_DEL_OESTE">El Más Rápido del Oeste</option><option value="LADRON_TURNO">Robo de Turno (legacy)</option></select></div>
        <div class="dr"><label>Acciones por ronda</label><input type="number" id="dp-acciones" value="1"></div>
    

        <div style="display:flex; gap:10px;">
            <div class="dr" style="flex:1;"><label>Cantidad de enemigos</label><input type="number" id="dp-cantidad_enemigos" value="1"></div>
        </div>
        
        <div class="dr"><label>Texto Intro</label><input type="text" id="dp-intro" value="¡Prepárate para morir!"></div>
        <div class="dr"><label>Texto Victoria</label><input type="text" id="dp-victoria" value="¡He perdido!"></div>

        <div id="dp-msg" style="display:none;padding:8px;font-size:12px;margin-top:8px;"></div>
        <button class="dp-probar-btn" onclick="probarEnemigoPersonalizado()">▶ PROBAR</button>
    </div>
</div>

<script>
// Lógica para el panel completo (Asegúrate de que esta función esté actualizada en tu HTML)
function probarEnemigoPersonalizado() {
    var id = document.getElementById("dp-id").value.trim().toUpperCase() || "TEST";
    
    // Agregamos el enemigo temporalmente al catálogo en memoria
    CATALOGO_ENEMIGOS[id] = {
        id: id, 
        nombre: document.getElementById("dp-nombre").value || id, 
        hp: parseInt(document.getElementById("dp-hp").value) || 1000,
        barra_hp: parseInt(document.getElementById("dp-hp").value) || 1000,
        color: "#ff00ff", // Color de prueba
        tamano: { x: parseInt(document.getElementById("dp-sx").value) || 40, y: parseInt(document.getElementById("dp-sy").value) || 80 }, 
        musica: document.getElementById("dp-musica").value.trim() || "rodeo-de-c4c.mp3", 
        fondo: document.getElementById("dp-fondo").value,
        
        habilidad_pasiva: document.getElementById("dp-habilidad").value||null,
        ataques: ["LLUVIA", "PINCHOS"], // <-- CAMBIA ESTO PARA QUE YA NO DIGA 'ataques: ataques,'
       
        
        tipoCombate: document.getElementById("dp-tipo-combate").value,
        acciones_por_ronda: parseInt(document.getElementById("dp-acciones").value) || 1,
        texto_intro: document.getElementById("dp-intro").value || "...",
        texto_victoria: document.getElementById("dp-victoria").value || "...",
        texto_revancha: "¿Otra vez?",
        
        cantidad_enemigos: parseInt(document.getElementById("dp-cantidad_enemigos").value) || 1,
    };
    
    mostrarMsgDebug("¡'" + CATALOGO_ENEMIGOS[id].nombre + "' creado! Iniciando...", "ok");
    setTimeout(function(){ forzarCombate(id); }, 700);
}
</script>

<script src="data/characters.js"></script>
<script src="data/enemies.js"></script>
<script src="data/attacks.js"></script>
<script src="data/battle_rules.js"></script>

<script src="js/motor.js"></script>

<script>
    // Mostrar u ocultar el panel y cargar la lista
    function toggleDebugPanel() {
        var p = document.getElementById("debugPanel"); 
        p.style.display = p.style.display === "flex" ? "none" : "flex";
        if (p.style.display === "flex") renderCatalogList();
    }

    // Dibujar la lista de enemigos en el menú
    function renderCatalogList() {
        var list = document.getElementById("dp-catalog-list"); 
        list.innerHTML = "";
        Object.keys(CATALOGO_ENEMIGOS).forEach(id => {
            var e = CATALOGO_ENEMIGOS[id]; 
            var card = document.createElement("div"); 
            card.style = "display:flex;align-items:center;background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:8px 10px;margin-bottom:6px;gap:8px;";
            card.innerHTML = `<div style="width:14px;height:14px;border-radius:3px;background:${e.color}"></div><div style="flex:1;"><div style="color:white;font-weight:bold;font-size:13px;">${e.nombre}</div><div style="color:#666;font-size:11px;">HP: ${e.hp} | ${e.tipoCombate||"NORMAL"}</div></div><button style="background:#0ff;color:#000;border:none;border-radius:4px;font-family:'Courier New';font-weight:bold;font-size:12px;padding:5px 10px;cursor:pointer;" onclick="forzarCombate('${id}')">▶</button>`;
            list.appendChild(card);
        });
    }

    // Obligar al juego a iniciar una batalla con un enemigo específico
    // Obligar al juego a iniciar una batalla con un enemigo específico
    function forzarCombate(idEnemigo) {
        if (!CATALOGO_ENEMIGOS[idEnemigo]) return;
        generarEstadoParty(); 
        impactosBoss=[]; trazoAtaque=[]; efectosGolpe=[]; textosFlotantes=[]; animacionTurno=null; isDragging=false; camara.zoom=1; lookX=350; lookY=225; screenShake=0;
        
        heroesEnCombate.forEach(h => h.visual.x = h.visual.targetX); 
        enemyCombate.x = enemyCombate.targetX;
        iniciarCombate(idEnemigo); 
        enemigosEnCombate.forEach(en => en.x = en.targetX);
        
        // 🎵 MIRA MIRA: Como el debug nos teletransporta y se salta la transición, 
        // tenemos que darle Play a la música manualmente aquí mismo.
        musicaBatalla.play().catch(e => console.log("Bloqueo de audio por navegador", e));

        estadoJuego="COMBATE_INTRO"; 
        esperandoClic=true; 
        document.getElementById("debugPanel").style.display="none";
    }

    // Crear un enemigo temporal desde el formulario
    function probarEnemigoPersonalizado() {
        var id = document.getElementById("dp-id").value.trim().toUpperCase() || "TEST";
        
        CATALOGO_ENEMIGOS[id] = {
            id: id, 
            nombre: document.getElementById("dp-nombre").value || id, 
            hp: parseInt(document.getElementById("dp-hp").value) || 1000,
            barra_hp: parseInt(document.getElementById("dp-hp").value) || 1000,
            color: "#ff00ff", 
            tamano: { x: parseInt(document.getElementById("dp-sx").value) || 40, y: parseInt(document.getElementById("dp-sy").value) || 80 }, 
            musica: document.getElementById("dp-musica").value.trim() || "rodeo-de-c4c.mp3", 
            fondo: document.getElementById("dp-fondo").value,
            habilidad_pasiva: document.getElementById("dp-habilidad").value || null, 
            ataques: ["LLUVIA", "PINCHOS"], 
            tipoCombate: document.getElementById("dp-tipo-combate").value,
            acciones_por_ronda: parseInt(document.getElementById("dp-acciones").value) || 1,
            texto_intro: document.getElementById("dp-intro").value || "...",
            texto_victoria: document.getElementById("dp-victoria").value || "...",
            texto_revancha: "¿Otra vez?",
            cantidad_enemigos: parseInt(document.getElementById("dp-cantidad_enemigos").value) || 1,
        };
        
        mostrarMsgDebug("¡'" + CATALOGO_ENEMIGOS[id].nombre + "' creado! Iniciando...", "ok");
        setTimeout(function(){ forzarCombate(id); }, 700);
    }

    // Mostrar el mensajito verde/rojo de alerta
    function mostrarMsgDebug(txt, tipo) {
        var m = document.getElementById("dp-msg"); 
        m.textContent = txt; 
        m.style.display = "block";
        m.style.background = tipo === "ok" ? "#003300" : "#330000"; 
        m.style.color = tipo === "ok" ? "#00ff00" : "#ff4444"; 
        m.style.border = "1px solid " + (tipo === "ok" ? "#00ff00" : "#ff4444");
        if (tipo === "ok") setTimeout(() => m.style.display = "none", 3000);
    }
</script>

</body>
</html>
